<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思考レシート</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 14px;
        color: #1e293b;
        background: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 16px;
        line-height: 1.4;
      }

      button {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 12px;
        color: #ffffff;
        background: #2563eb;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      p {
        margin: 10px 0 0;
        color: #475569;
        font-size: 12px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h1>AI会話を思考レシートへ</h1>
    <button id="createReceipt" type="button">思考レシート化する</button>
    <p id="status">現在のAI会話ページを読み取り、Webアプリで候補を開きます。</p>
    <script src="popup.js"></script>
  </body>
</html>
