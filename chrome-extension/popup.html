<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思考レシート</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #1e293b;
        background: #f8fafc;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 10px;
        color: #0f172a;
        font-size: 16px;
        line-height: 1.45;
      }

      button {
        width: 100%;
        min-height: 44px;
        border: 0;
        border-radius: 12px;
        color: #ffffff;
        background: #2563eb;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      p {
        margin: 10px 0 0;
        color: #475569;
        font-size: 12px;
        line-height: 1.6;
      }

      .notice {
        padding: 10px;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        color: #1e3a8a;
        background: #eff6ff;
      }
    </style>
  </head>
  <body>
    <h1>ChatGPTの会話を思考レシートへ</h1>
    <button id="createReceipt" type="button">この会話を思考レシートにする</button>
    <p id="status">現在開いているChatGPTの会話を読み取り、Webアプリで候補フォームを開きます。</p>
    <p class="notice">見られたくない会話や個人情報を含む会話では使わないでください。取得はこのボタンを押した時だけ行います。</p>
    <script src="popup.js"></script>
  </body>
</html>
